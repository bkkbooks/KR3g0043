body:
  text: 月波洞中記卷上仙濟燕雀之志嘗思爪下之食腸不盈於百粒聲不逺於五畦翺翔藩籬之下其氣量亦自足矣鸞鳳之志一舉千里非梧桐而不棲非竹實而不食鳴於朝陽天下稱其慶志度氣象固自有殊也是知有衝天之翼者必不肯棲托桑榆有方外之材者必不肯貪求名利志之所向取舎以此觀之志趣逺近氣量深淺自可見矣九天𤣥微凡欲相人先視其首頭者五臟之主百體之宗四維八方並須停正左耳為東方右耳為西方鼻為南方玉枕為北方左頰為東南角右頰為西南角左夀堂為東北角右夀堂為西北角方維既正乃視其骨骨法九般皆貴相也無異骨終難入貴所謂九骨者一曰顴骨二曰驛馬骨三曰將軍四曰日角五曰月角六曰龍宫七曰伏犀八曰巨鰲九曰龍角東西兩嶽高成為顴骨勢入天倉為驛馬耳齊為將軍骨左眉上隱隱而起者名曰日角骨右眉上隱隱而起者名曰月角骨遶眼圓起者名龍宫骨鼻上一骨起者至腦名曰伏犀骨耳兩畔溝朏骨髙者名曰巨鰲骨兩眉毛入邊地稍髙似角者名龍角骨亦名輔角骨已上九骨皆三品之相人額上骨圓大名天成骨顴勢入耳名夀骨兩耳後骨起名玉堂骨亦曰玉階骨項後骨起如雞子者名天柱骨亦貴相也𡨕度尺宅從髪際至地部一十三部位左右東西共二百三十五位其部分衆多其象類參雜若定取紋理黒子則吉㐫之理森然難見要其大只在於骨法神氣但先相其骨法觀其神氣則貴賤自明矣凡骨形已見以手揣而識之者名為骨法骨形未見以眼看而識之者名為骨氣骨法則止知見定之形骨氣則可見未來之事是知能辨骨氣者𤣥於法也神有餘者形或不足形有餘者神或不足或俱有餘或俱不足視其骨察其心則神形可見盖形麗於骨而神宅於心此是其主不必廣尋也經云心者形之主形者心之器也神主其心心主其形形體端足魂魄自全四體屈伸神精荒散君臣相合四支相助自然之理也能知神在於心心能清浄則福自生矣是故神稍清形稍𦂳者必為富貴人也神稍濁形稍慢者必知其貧賤也老君之歌曰百刼廣修異骨生骨肉不合神非靈嶽牧旌旗骨上生先看骨肉不聽聲玉柱相成千萬兵次看食地廣能平天倉地庫連滿城龍宫日月應天庭神形清潔君呼名審神察形自有程有此骨者身必榮錄在天府仙洞經天地之内人最靈直見一生推豪英靈嶽凡人受氣懷胎皆禀五行隻曰男雙曰女得其偏者形骨必俗稟其粹者神氣必全形有厚薄故福有淺深神有明暗故識有智愚雖吉㐫貴賤紛綸不齊而神見於動作形備於骨法善惡有相可得而知今以精神氣色才智骨法次第考核設九成之術以觀之一曰精神二魂魄三形貌四氣色五動止六行藏七瞻視八才智九徳行凡精彩分明為一成魂神慷慨為二成形貌停穩為三成氣色明浄為四成動止安詳為五成行藏合義為六成瞻視澄正為七成才智應速為八成徳行可法為九成又有九骨一曰顴骨二驛馬三將軍四日角五月角六龍宫七伏犀八巨鰲九龍角已上九骨凡有一骨起者亦為一成老君歌曰顴骨成權合主兵驛馬分茅列土人將軍骨起將軍位日角月角佐明君龍骨清明好官勲伏犀刺史隠衝門巨鰲遶朏尚書榮龍角玉枕三台臣九成八成臣中尊五成六成臣中臣三成四成五品人一成二成有微勲有之不成不白身無成無骨永沉淪三品貴者皆識人識人必貴自通神神魂清浄貴人親君須識覽洞中文幽隠凡人氣血之成出於毛髪毫白者主夀黒子上生毫者主貴相若頭髪老來勝者不宜夀髭髪少白不宜夀眉耳生長毫者至夀眉生白毛玉堂骨起仙人之相胷上生毛主學道術背上生毛㐫惡之人兩肩上或臂上生毛主慈孝有禄腹上生毛大富膝上生毛者少官禄足下生毛者極仙品人若足下生黒子有禄之人一孔三毫富貴之身圓靣豐頂後連山勢起髪少者富貴之相也河嶽凡相人靣五嶽欲其相朝四瀆欲其不混形神備足富貴之相所謂五嶽者頥為恒嶽額為衡嶽鼻為嵩嶽左顴為泰嶽右顴為華嶽所謂四瀆者眼為淮耳為江口為河鼻為濟髙成曰嶽深厚曰瀆嶽欲成而瀆欲清若更精彩自足有威有媚接對無偽信行不欺此乃形神備足矣凡人言辭審正聲音安詳瞻視尊貴舉止沉隠折旋俯仰諸凡安貼使人見之不覺悚然生敬者蔡澤云第一上相之人有此威儀老君歌曰五嶽阜成終不貧圓頭項短足珠珍耳有垂珠度百春驛馬骨成主萬人巨鰲骨圓尚書身虎頭燕頷主騎兵鳯頭千里受其榮從少至老不識貧如同靈鶴在凡羣又歌曰江淮河濟湛然清四海之中必振聲五嶽並無一嶽毁一年福盡一年生五嶽成來四瀆濁其人不富有官榮法原缺三字各分明為文位列三台貴為武權持萬騎兵心隠夫欲相之必先試之性行相外乃得其真欲知其性行者察之于眼驗之于口則可見矣心者神明之舍目其竅也其神内守而其明外鑒故觀其眼可以知其心矣心主于火目主于木火木相生乃分輪理心有五輪故目有五等所謂五等水火木金土之精也目如初月者屬水如懸鈴者屬火如破梯者屬木如卧弓者屬金如圓杏者屬土初月之目壬癸之精水流不逺無信之相也懸鈴之目丙丁之精禮樂情懐似火之徳也破梯之目甲乙之精瞻視瞬息似木之性直其間亦有虚妄不實者盖木身雖直而果味不同故也卧弓之目庚辛之精弑君弑父陣亡兵死天生露睛是也圓杏之目戊巳之精忠孝信行似土之徳言者心之聲也靈氣漏露發而成響神静則辭寡神躁則辭多是以既察之于目又驗之于口多言數窮不如守中周廟金人三緘其口君子欲訥于言而敏於行故知多言無益最減人相凡人言語無綂緒好摭人短處自恃巳長處此人也輕薄無行衆所共惡摧挫失志禍從斯起矣夫聰明豁達者少迍執迷勾留者多滯是以君子之性通而不執小人之性執而不通君子有將來不期身貴而自貴雖不徼福而福自至焉小人無此去自望身榮而多得禍焉故曰凡欲相之必先試之凡閲人必詳察其骨狀似載棟梁者貴人也眼有盖而魚尾逺者主有大禄天勢圓大旗亭廣博心目分明品位自崇瞬息不定瞻視不常心性不定之人也羊眼四白死于道路蜂目猪眼毒而多淫大小不等眉頭屈曲若下視者皆夀短之相精神不定目急者無信瞳子微小赤脉亂侵者並主惡死目下小者為善相四大猖狂目不自歛衣食必破經云重瞳者未必為貴眇目者未必為賤仔細觀察相可知矣貫徳金毛五色是鸞鳯之衣紫綬金章是朝天之服故知神不貴者其形不永期也人受天地五行之正氣一月精血凝二月胚胎成三月綂血脉四月形體就五月能動轉六月毛髪生七月筋脉至八月臟腑具九月榖氣在胃十月百神修具出于子亥之門然後成人藴胚胎之真粹稟靈骨于幽𡨕情欲既萌遂生禍福事雖未兆神已先知發于五神是為五色布在靣部吉凶可知青憂白哭黒病赤災惟有黄氣獨主喜慶更須紀四時瞻察隨本相以相生則災福之理昭然自見夫貴人者含靈受炁稟之於天和血脉形神降之于精髓山有玉而草木鮮水懐珠而波瀾媚人有貴氣者形神骨肉自然異于常倫無藝無才亦有大禄雖處貧賤之中人自欽仰此貴人之苖也但看禮度接對行步笑語精神自在異于衆人貴人一見便加愛重保䕶願其顯達者是也老君之歌曰三品貴者皆識人此其象也賤人者雖能語而無神雖有形而無骨視其氣則不潤察其色則無光手足失墜筋節不續舉措悚懾作事乖違其精神語笑禮度接對一見可知更不在相也經云頑石投於江湖雖千年而不潤白玉投於沙泥至刼盡而轉明形薄者不可以任重神濁者必難以當禄元氣失者視之不遥元氣勝者望之愈逺氣貴者望之如雲霄氣賤者望之如糞土其根本深淺亦可知矣經曰莽蒼無色終年貧黄髪亂垂乞為伶腹淺凥薄無屋薪忽行視後多孤辛腦髪半垂少失親鶴頂結露不用論區區終日没精神肉多口大蠐螬身縱得公卿命早迍更有掉腰蛇行人雖年百嵗守孤貧玉枕兩耳上平為百㑹前為額後為腦前為星堂後為玉枕枕之骨凡一十八般皆公侯富貴之相也今具骨法如後車軸仰月覆月方枕一字背月十字八字玉環右撒左撒三關鷄子山字連枕品字垂針懸針經云凡人有此骨者皆貴相如作僧道雖不貴有此玉枕者皆主夀凡人稍有玉枕但有骨㣲起者皆主禄夀旺平仄無者禄夀難逢婦人有之皆亦主貴矣峕政和四年六月將仕郎充髙郵軍學教授潘時竦校正耳限十五年耳若無珠者不貴若有珠者不貴何也難得正垂而生謂不得地也珠若生正垂謂得地也向外貼者為失地也若正月十五夜珠係青白珠最為上也若青白色光潤是也如豌豆大帶五顆者必建節若八月夜珠者次也四五品官也若帶三顆者合取一品係磁白珠也白瑩潤六七品官也帶兩顆者有官無職若五月十五夜珠者下也係粉紅者是也如豌豆大帶五顆者四五品官也若帶三顆者如豌豆大七八品官也如三四顆者八九品官亦有官無職如兩顆者無官而有權若粉紅者不光澤而圓者如五月珠者多饒限弱反覆此已上三等珠都要顆圓者貴不圓者减半取富貴輕向外貼者自立也若向裏貼者長富要耳貼輪而厚取富貴凖也左耳不牢妨父右耳不牢妨母不牢者無根也薄而無垂也額限十年若重額者為人多樂也若天庭骨正者入廟堂又為天頂者承以䕃為白色光潤明也上至髪際下至眉齊若額不似熨者不貴熨者是明也如兩重額者合取二齊鬢生向前者初年多滯及犯了額者堪一齊也婦人有重額者多饒貧賤也重額者額上有附肉者是也必食離合之財左額上有痣者陽人多不在家亡也若陽人有三骨者額上身邊骨起是也必過長上之基若有天倉是富人之根本若滿者富貴也不滿者反是夭短髮際下者必夭夀若山源不正平生三破左壁好者食祖基右壁好者食其妻禄合立外財眉限四年若眉細長稀踈正平有彩者貴黒濃麄無光者不貴若隂人得正隂眉者平生多樂也若陽人得陽眉平生亦多樂也隂人得陽眉者敗陽人得隂眉者濫陽人有聖眉者必食隂人重疊之財若眉重者是眉上有肉附髙也若男子眉不停者出子於衆母也如眉散逆者必棄前妻後就富妻此人命短及絕嗣有大徳者减半若有勾者小背向下曲者是積行人也陽人隂眉散者必定妨妻多也散在小背者妨兩三箇也散在大背者妨三五箇也若隂人得正陽眉者及散者妨五七夫若陽眉不正及散者妨兩三夫若十分陽眉散者必落娼陽人眉有角者是眉毛三五根成縷也必見兩三箇妻也眉生四角者必見三五箇妻也眉角盛者妻多也若眉眼相近者不宜初子也注異有聖眉者合得隂人之財眉上有附肉髙者是也眼限六年眼中有神者貴無神者不貴必為人昏暗若七分内神者及第十分内神狀元取一齊眼裏有學神旺者為樂有才神者小貴夫剛骨有肉者積財巨萬剛骨不正者亦積財巨萬額上有若指甲潤者是剛骨也若正者三品官也不正者五六品官也婦人有剛骨者多妨夫及出子於衆父也三品以上貴能兼富四品以下富能兼貴眼裏無學神者或不秀者不髙貴也視低無學神如無目人覷其三鼎婦人眼内有神者下也目斜視好殺也目正視者平也疊睛平視者平安多遭寃枉之事眼神散者多發疾眼屬南方日月之宫是神之所舍外照萬物或開或閉灼然不見或秀或媚或威或惡長守黒白分明視物有力囘顧有常掌三公之位不可逃也睛有三角睛外露赤縷貫睛區區覔食相之下也眼中有三㸃神者必建節有兩㸃神者五品官若左眼下有卧蠶者目下光潤如卧蠶之狀必主食僧道之禄若右眼下有卧蠶者必食隂人之禄若左眼下胞匀硬主三子之數右眼下胞匀硬主六子之數左右視髙及神明者係子多也於内有顯子也夫則覷其妻妻則覷其夫行業者為先謂如夫帶三子妻帶七八子者夫有行也左眼有層紋者一箇兄弟兩層紋者是兩箇兄弟若層紋在裏者兄弟不得力有义紋者兄弟子不到頭上胞為父下胞為子父宫胞硬則父送其子子宫胞硬則子送其父眼若悲啼兩角白仁多者兄弟多饒衆母也若眼臉下迎上不過月餘上迎下不過百日兩相併者是早亡者有殺人難殺在眼若疊睛垂視及斜視下視為殺不散者澄湛為上也鼻限十年若鼻不直聳者不貴有節必兩姓也若鼻近上有節者祖姓不真近下有節者自姓不真鼻不藏竅不富如富者必側近有庫也若鼻蹇四十五大破也聳者貴有庫者足鼻肥兩端紅潤者是也若有仙庫者足富貴有俗庫者足財庫在仙庫之下單庫者下半雙庫者雙也若鼻懸紋者多移落他鄉鼻小及人中蹇者平生多動摇也眉過目人富也如狼目虎視全者富貴不全者富而不貴也只可同憂不可同樂上下唇二十年若口不方者不貴是一齊之齒四海之方圓合要方開要圓齒齊密者取富貴准也若齒有三十六箇者大貴如稀少者及唇掀者賤如四海方圓髙得助也唇紅齒白富貴之苗也頦限五年髮疎鬢美者富貴得助頦下有成膂肉者足富頦中有蠶者限外有餘夀命七十有三勒腰蠶者七十八不固减三年八九十者看餘限豐滿也頦下旋生膂肉在頦骨下必主近有權也
