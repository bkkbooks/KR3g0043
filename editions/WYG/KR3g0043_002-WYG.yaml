body:
  text: 月波洞中記卷下論八限眉耳額限初主耳限八限之先不欲焦黒及有粥衣主腎臟有疾而不貴如㺅人有者不妨世人只知無珠者不貴如貴者何也輪廓分明紅潤有刀環也大抵耳不欲向前不欲低於眉謂耳低於眉不要反輪必破祖也風門不欲小無學之人也不欲上廣下狹父母早亡也虎形上尖下濶猴形人亦上尖熊形人上下匀停獸形下狹上正也如反輪不破祖下狹遲亡父母風門小而有學者何也看其髙於眉紅潤有氣也主初年駁雜當細辨之如行運男左女右交生日後起有缺者在襁褓中有疾驗也十五生日交額十年之限也額有長理主早年不遂心有亂紋如波者小貴前三日不似熨者不貴也如貴者何也必是日月角分明及伏犀髙顯天倉骨入兩府邊地弔庭輔角此數骨為之剛骨有一於此限至亦貴重額正者入廟堂陽人有三骨額上靣邊有者是也川字骨正者五品人如有尅陷及瘢疵黒痣者八九品官須自立謂早年無可得之勢婦人額有骨者賤天中有圓骨主棄前夫就後夫此乃無徳主殘疾於老年要日月角分明陽人若兩眉角上有山林字者主二千石禄婦人有者國夫人有山水字者主少年榮顯年邁必有求道之志大抵要廣平有骨不欲鬢侵於馬主初年多滯山林缺者子孫稀婦人亦如此子孫多者老年亦不得力也陽人兩額角有立紋主殺婦婦人有者主殺夫天庭逺無紋黄老之徒也天庭短者主夭清鑒云有天者貴頭是有人者夀鼻是主富貴兩全有地者富頦是豐滿重者亦富貴兩全二十六生日後交眉限眉者左為紫氣右為月孛不欲相敗如小角散者男妨婦女妨夫如一字者主有學􅆆立者不善終兩眉如八字男客亡女不正如斷者及不光澤麄破者不等者有瘢痣者謂之眉殺斯人也無徳陽眉者疎而秀有彩若男子得之平生多樂也隂眉者黒濃細者女人得之為正妻婦人得陽眉為正妻者何也必是墻壁平正及額好者為貴男子得隂眉平生多樂者何也必是有青彩之色男有陽眉而覆眼者主榮婦人有隂眉極濃厚散者主身不榮此賤相也有角者是正妻如無應驗者何也必是峻髙山林缺也以上三限者是初主眉上輔附馬髙食外財禄重眉者主身閒有財帛婦人有者必伶俐眼限鼻限上為中主眼者人之瞻視欲藏神而白睛少者貴三㸃神者及餘限有力者主建節眼神忽然出散者七日内身亡上下臉相逆而塌者四七日亡也如定者不妨止於大病如有紅絲貫睛者不善終正虎形人不妨下視斜視偷視者多隂賊女不貞烈孤淫之婦也男子眉眼相近顔色黒者嫉妬奸猾之人不可與交婦人如眼有烏及濕者謂之寡婦守空床之象婦人若神光不散顧盻有常精神不亂視淫邪主貴有夫人之稱眼偷視斜視下視看人不休者及言語多笑而媚者主娼妓之材也眼不欲露印不欲深卧蠶要明潤此全相也若卧蠶無光塵土色者更亂紋交侵者不貴孤獨之人也男子龍視虎望鷹視富貴兩全交三十六生日後鼻限山根為始鼻梁平正凖圓者貴也如不聳直貴者何也必有明潤之氣梁曲者男女俱淫山根若有紋者初年遭苦主三十六有災也年上紋者主門户成敗夀上有紋者身多臨災凖頭有主作事無成年上白者忽而見主傷財夀上忽而見者主獄亡凖上有白色者主人相鬭有傷損虎形人鼻露竅者不妨鷹鶴形人凖尖年髙夀低其餘露竅者四十五大破也如兩郡有庫者不妨臨年亦傷財有仙庫者富貴雙全蘭䑓紅潤者是也淨庫者减半右廷尉是也俗庫者蘭䑓廷尉如潤似見不見紋者傷子雖有亦不孝四十六生日後交上唇欲得方様人中欲深長者主衣禄不缺人中上廣主初年得子下廣晚年得子人中匀停深長者主生貴子發祖人中下濶者少閒上濶者老鰥許負云人中深長一世吉昌人中廣平養子不成人中漫漫無子可憐如不正及瘢痣者有妨此乃上唇之輔助也上唇紅潤者貴及紋理缺者定有災掀露齒者不睦六親好説是非無徳之人也欲得下唇相應有氣不掀露為貴相唇紅齒白富貴之苗若不言而自動者是非之人也婦人亦如此為人不和此二限為中主下唇頦為末限下唇欲紅西𤓰子上下相應無缺陷亂紋者上唇為君下唇為臣相得為潔浄言四海方圓者是也開要圓合要方承漿潤者衣食不缺世人只知齒露不貴露齒貴者何也必是人中深長齒白唇紅故舉一隅不以三隅反斯之謂也頦者地也豐滿及兩倉不陷主荘田奴僕金帛成家之象也若尖薄者主末年貧賤也無倉庫奴僕者不全相也若有亂紋侵者主失所移落也此二限為末主共十五年也耳起不倒髙如眉鼻不昻凖頭齊三處皆應少年名播天下詩曰金木雙全廓與輪風門容指主聰明端圎聳凖朝羅計富貴榮華判令名金木生衣一世貧輪飛廓散主艱辛於中亦有為官者終是區區不出羣耳珠貴詩輪廓分明分外竒耳珠朝口禄無􅃜朝口曰常常紅潤主清貴年少登科衆共知耳内貴詩耳白觀來勝面容多才飽學禄盈豐生毫曰當為扶助朝中相孔内生毫貴不同圜耳詩耳聳圓環有數般若然輪薄不須觀損夀曰極嫌輪廓無分曉六月炎天也道寒耳孤獨反詩耳反無珠福禄慳更加黧黒禍綿綿無珠曰木星若得無㐫陷却許將來夀數堅耳輪詩枯淡輪翻貼肉生耳珠無墜少精神枯淡曰一生作事無成就雖有文章未顯榮兎無禄耳詩兎耳常髙卓耳舒上尖下大薄皮膚聳起曰妻兒兄弟多無力財禄宫中不至餘平夀富坦詩耳如平坦喜非常家道興隆有吉昌耳曰可與石崇彭祖並富而必壽壽而康齊夀福禄眉詩耳生輪廓聳齊眉此相如逢總不􅃜耳曰實利虚名皆有分一生福禄享耆頤小無禄孤墜詩耳珠小墜又何如東奔西走百事無耳曰命淺可憐福禄薄刑妻害子一身孤反末主好珠詩人如兩耳反生珠歴盡風波没坦途耳曰富貴少年誰敢許老來佳景屬桑榆墜有福輪詩耳若珠􅂷號墜輪更兼氣色與精神耳曰一生衣食長温飽便是安閒享福人佛性善耳詩耳名佛耳不堪言性善心慈極好閒曰一炷名香經一卷自然清福樂平安反少福輪詩凡人有此反輪耳平生勞碌無休止曰因何心地不安閒招得相形能若是小中平珠詩小珠耳相本風流也有歡娯也有愁曰終是喜多愁却少知機平稳老來休方耳詩方耳元來相貌竒聳白生毫夀不􅃜曰細小色黧命短薄若還堅厚足豐衣額其峻如立壁其廣如覆盂明而澤方而長者貴夀之兆左側者損父右側者損母其上欲得不蹋不尖無亂紋無凹凸反此者迍蹇日月稜角而起者二千石印堂至天庭有骨隠然而見者少年榮達又云二十八嵗邊地山林皆欲豐廣坑陷者貧賤郭林宗觀人有四學堂一曰眼為官學堂為長而清有官而夀二曰額為禄學堂其圓而正主忠信踈缺而小主狂妄四曰耳門之前為外學堂耳前豐滿光潤主文學聲譽反此者愚下之相按此條第三學堂缺額有黒氣顯者横災於旬日内靣若􅂗膏主獄亡兩地倉有黒氣者噎食病死承槳地閣有黒氣者主酒食有毒傷死七日内顯青色在承漿者主酒食而鬭争青合有紅色者主七日内有遺災奸門有白氣者主妻有私通及傷害自身也有青紅色者主有祟日月角忽然紅色起者主十日内得財也似紅不紅者主百日内得財鼻直有白氣色者主孝服井部有黒氣者主犯災金匱有青黒色者主傷財門閣有青色者主凶事入宅有黒色起於兩頰者四十日身亡羅計星位眉欲踈而秀平而濶主智信仁義秀而長者性聰敏眉過眼者豐富眉不覆眼者乏財左有旋紋者妨父右有旋紋者妨母麄濃者愚賤下壓眼者貧賤斜卓者性豪急頭起尾下者懦弱眉頭交者貧薄少兄弟不得力生毫長一二寸者主夀眉促而愁者孤獨骨稜起多迍否眉毛短骨起者性剛一眉為人無信義眉心有旋毛兄弟隻居自卓立稍得縱有妻兒氣不合又兩合恰如一字之狀又得鼻孔不昻耳孔容指此乃三處皆應此人有行義但執性剛強中年大發人之有行也積於心而行於眉眉小角有似曲鈎者父母積徳也自身多有行也故曰行在眉取盡者為大煞或二眉等而促及短破斷者孛與紫氣有缺者為取盡臨事當細辨之印堂名紫炁星印堂濶而平二眉不相連更得蘭臺廷尉之處皆朝大貴矣主子孫顯達若狹而連主賤不習好人專習小輩祖業破盡妻子難為又無實學碌碌人也鼻為中嶽其形如木云云黯黒仄薄者不賤則夭隆髙有梁者主夀弱而小者夭賤山根不得蹙折勾紋者苦窮忙碌山根不折鼻梁不曲常常明朗晚年有禄主妻賢淑若是無肉與人不足可宜善守不可與人交接人中立理及有黒子主飬他子光明潤澤富貴來逼縱横理者不利子孫其小如線貧寒下賤五嶽及有小氣所管屬者衡如滿月南嶽泰如鷄卵東嶽華若方銀西嶽嵩若髙發中嶽恒如倒提北嶽五嶽全者及餘皆好無剋陷者食禄主貴乾雍州陷者無地宅艮兖州陷者無食禄震青州䧟者少仁德㢲徐州陷者闕信義離揚州陷者多官災坤荆州陷者妨妻兊梁州陷者孤苦戊豫州陷者無田土此九州如有缺陷者限至必應雍州白色常潤冀州青黒色主酒色上亡兖州青紅色主吉昌青州青色吉豫州黄色吉其次常改青憂黒横白㐫赤官事黄吉隨四季觀之虎頭龍腦將軍輔相之形額上有七星之紋理合乾坤之道龜鶴體官職富貴之資雀豺身忘家破宅之兆頭尖腦薄浪走他鄉露齒結喉失於鄉井女要唇紅齒白舉動去就低囘男要耳鼻肥圓舉措祗敬嚴畏見男貌似女女作男形眼光彩大而雄聲皮膚麄而行步大女人之窮相也眉小眼細靣白聲雌接對失詳語話軟弱此男子之窮相也有威可畏貴人相也有形堪敬福人也有色可重媚人也骨格隆峻道藝人也擁肉肥光徒使人也面貌凹凸庸賤人也眼多紫色剛烈人也眼多赤色惡性人也眼多白色淫邪人也眼多黄色疾病人也眼多青色真貴人也眼目低垂離别人也眼帶雌雄百般人也雜論印堂項腰足印有紅字宜官兩道紋者主刑一道印者破印不善有八字者貴潤者得助行滿無瘢痕痣者貴項有雙絛細者貴無肉成敗多也腰欲圓不欲滿足欲方厚此貴相也眉不欲早生毫年壯不欲早肥肥不欲氣喘夭相也印堂濶而不富何也多是峻髙不平手平背大根氣堅牢臍乃一身脉絡所聚之地欲得深大深大者乃福夀之人淺小者極下愚亦夭臍深容李富貴自起不可太突無智無慧臍生毛者主大貴生近隂者主下賤愚僻臍圓如錢富貴百年又云臍為五臓之總欲深濶不欲淺凸紫黒者為上有横紋者主有夀神骨馬相神者藏於目男子有者貴骨在額天倉有氣色者貴馬在兩天倉兩頰骨耳邉謂之貴人有四馬乗其駟馬車若求進之人四馬不肥塵暗者終身不貴縱有成立亦不多時馬有白色者主行人半途而迴有紅黄色主吉昌有青黒色者主道路死亡之象正猴人建節單猴人萬貫像猴人足富貴自立要猴形貧賤正牛形人二品熊形人四品偏熊人萬貫行熊敗熊貧賤正虎形人建節象虎形人七八品官􅀞虎形人十萬貫權虎形人萬貫卧虎病虎形貧賤心乖鳯形人作宰輔猴形倉庫陷者身背向前合齒細青唇髙耳不分明鼻髙年夀低眼上輪覆下眉如角弓天圓而短頰髙聳肩行掉臂單猴有尅陷像猴耍猴人笑語無度行不依徑虎形上尖下闊頭短而圓項麄背骨髙有肉髻眼白睛帯紅黒暗帯黄鼻山根微低年夀濶鼻頭露竅口濶紅潤聳肩行頦方指短脚短腰背微曲食如連雷睡乃哮吼秉生殺之權像虎人有尅陷者有一於此不為像虎人也􅀞虎人腰長睁目手足發有威風中行愛低頭坐握手視物不轉睛權虎人减半餓虎病虎靣肥身瘦眼無神容貌不光澤牛形人面長項秃􅁂稀額有肉角行步詳緩有心謀眼有紅縷鼻聳直頦微尖麄也正熊人面方頭圓項麄行不掉手腰軟身上毛髪多愛拭唇鼻凖圓頦方耳聳上下匀停故也行熊敗熊氣清身瘦不識綱常少信實也鳯形眉細長髪鬢清踈每有凌雲之志鼻衝直身細長餘外形當細求之不出乎此類矣聲至喉而沉響者貴在喉而出響者須自立發於中年先響而後破者無朋友獨强主先富後貧先低而後髙逺者主不得祖力中年貴發於千人之上善相也前後匀響者無破也主長富貴婦人有此聲者欲清而輕氣欲調而不急主榮貴旺夫自身守郡國夫人先髙後低者妨前夫主淫先低後髙主祖不髙須自立亦妨前夫重濁逺振者主富妨夫多矣重濁而短者主身貧賤若破者鬭亂之人也主夫不和若八限中無氣終身貧賤不令相也前言千尺之索者行也穿滿者大貴取盡者為大殺行在眉鍾吕二真人為證也夫形以養血血以養氣氣以養神故形全則血全血全則氣全氣全則神全也孟子曰今夫蹶者趨者是氣也而反動其心是知神能養血與氣神托氣而安也氣不和則神暴而不安能安其神者其惟君子乎宜細而辨之乃為善也寤則神逰於眼寐則神遊於心是其神出於形為形之表也亦猶日月之光外萬物而其神固在於日月之内也夫眼明則神清昏則神濁清者貴濁者賤清者寤多而寐少濁者寤少而寐多能觀其寤寐則知人貴賤也斷及第若靣壯上耳有圓珠額似熨平眼中秀有神初年及第額要圓眼要神或有秀若鼻聳直中年及第眼要神秀鼻要附耳四海方圓末年及第三齊必正四品官也四齊人入廟堂若四齊有一缺必建節三齊之下二齊之上定難立也若虎形人必建節偏虎形人四五品權虎人主十萬貫睡如哮吼食如連雷􅀞虎萬貫饑虎貧賤正熊人七八品官偏熊人三萬貫行熊敗熊主貧賤猴人入廟堂正猴人建節象猴人足富貴偏猴人三萬貫單猴人萬貫耍猴人貧賤依此五行之理推其富貴貧賤以類推之觸類而長之其他一切飛行之狀皆可知也所以舉一隅而不以三隅反母猪肥人肥在二十年以下十五以上者不過三十七八亡也如食不淋漓者善終猔猪肥人肥在二十以上二十五以下如不食肉善終若食肉者不過四十五六亡也若四十以上肥者謂之福肥長夀如婦人骨頭尖者必棄前夫後寵富夫此人無徳主殘疾夭亡及絕嗣積徳減半又注馬在左右倉肉髙彩紅色如小錢大是也剛骨如指甲紅潤在天中是也又人有五象南人似北人貴北人似南人賤南人靣如雞子北人靣如斗底様是也斷富貴神骨馬象者俱全大富貴十指如􅝕瓦雙背全然厚足下要平平若神骨馬象俱不全者亦常人之命也相云非髙命也夫人有四馬乗其駟馬車生在孔雀之窩初年建節生在孔雀之門中年建節生在僊隺之家末年建節在孔雀之家馬速貴速賤𦂳也富貴要聰明指甲如􅝕瓦足下更平平止於富也凶暴五章眉尖眼雙􅆆赤縷貫瞳神氣亂精神急凶亡不保身骨節麄無比言髙似虎威鼻梁垂劒脊凶暴必身危羊眼口尖掀身麄坐更偏色焦神氣露因此䘮天年鬢反若無徳凶亡為氣豪眼斜賢更避須中小人刀横肉三拳靣㣲㣲貫赤筋目圓睛白凸性暴是凶人惡死五章刑殺帶豪强知君主惡傷眼頭尖尾大心暴必强梁眉亂凶神起雙眸帶殺光額尖通口聚虎口遇豺狼兩眼傾如劒雙眉起似鎗莫教身帯殺垂淚赴甎幢睡眼開還合惟嫌露白睛假饒形相善生不保前程口濶無收拾形麄眼帯凶莫教神氣暴賊死向山中疾病五章粥衣生兩耳靣色帶烏塵既竭天精位腎也看看喪汝身黄㸃滿天倉乾焦色不揚也應脾有疾積乆見身亡面白皮膚薄胷髙氣不舒髪焦髭􅁂赤肺病定難除青氣浮光見唇焦眼肉乾木肝也衰嫌靣黒尤忌鼻頭酸神亂及神癡心君定可疑脉紅須見血傷損更無時夭折五章縮唇并露齒神迷色帶煙三長連二短那得保終年肉重皮膚急神强氣不舒結喉并露齒應死在中途氣短精神慢眉濃眼色乾鬢焦唇更白指日伴青蠻暗黒雲煙起形􅃜骨不隆眼斜神更亂四九定歸空口細胷前凸頭低視不昻肥人如氣促妻子守空房許負謂七寸之靣不如一寸之心七寸之靣易見一寸之心難測積行者難相損己益人為樂𢃄殺人難相害人安巳為樂斯二端故難相也眉毛早白者不得夀二十生毫三十死三十生毫四十死四十已上生毫者主夀長有重眉者呼為後印堂心定四十六七已上發財也
