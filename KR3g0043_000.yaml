body:
  text: 提要月波洞中記二卷術數類五命書相書之屬臣等謹案月波洞中記見於宋鄭樵通志藝文略者一卷稱老君記於太白山月波洞凡九篇朝公武讀書志亦載此書二卷序稱唐任逍遙得之於太白山月波洞石壁上凡九篇相形術也與藝文略所記並合宋史藝文志載月波洞中龜鑑一卷又月波洞中記一卷皆無撰人姓氏其為書異名抑或兩本别行已無可考自來術家罕有徵引惟永樂大典所載尚存核其體例蓋猶據宋時刋本録入並有原序一篇稱老君題在太白山鴻靈溪月波洞中七星南龕石壁間其說與藝文略相符而序中不及任逍遙之名則亦非朝氏所見之舊矣序末又題赤烏二十年七月二十三日案相術自左傳已載而序中乃獨稱鍾吕二真人鍾離權生于漢代其事已屬渺茫吕則唐之洞賓𫝊記鑿然何由三國時人得以預知名姓且赤烏紀號盡十三年又安得有二十年明為不學之徒依托附㑹其妄殆不足與辨特以其所論相法視後來俗本較為精晰當必有所傳授篇首自仙濟至玉枕九章其詞亦頗古奧蓋即鄭樵朝公武所言之九篇疑原本止此故諸家著録皆稱九篇以下或為後人所附益亦未可知也然相傳已久今亦不復刪汰以篇頁稍多析為二卷以便循覽且徴示原本與續入之别焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀月波洞中記原序醫卜者皆術也醫而不驗非所謂良醫也卜而不應非所謂善卜也愚之神術非敢稱善謂無所不應矣素非伎者昨因求士假術以講道夫相者先相出氣重者為貴輕者為賤若人內心神有千尺之索是行也穿滿者為大貴取盡者為大殺此索係鍾吕二真人為證也穿滿者眉有曲鈎者積行人也取盡者眉毛散逆及斷者粗硬者為有災無德夫相者天地之𤣥機聖賢之藴奧取禍福而無差定生死而有則遇之於相始之鍾吕之太白山石室中有逸人陳仲文傳之三卿張仲逺余因得之而不敢隱故傳於世斯誠神異術也又云相術九篇乃老君題在太白山鴻靈溪月波洞中七星南龕石壁間如有志人念得斯九章精通其象廣拜道術赤烏二十年七月二十三日序
